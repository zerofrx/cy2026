<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cazadores de Amenazas — Variante A</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00FF87;
    --dark: #0a0e0a;
    --card: #111611;
    --border: #1e2e1e;
    --muted: #4a6b4a;
    --text: #d4ecd4;
    --danger: #ff4444;
    --warn: #ffb300;
    --blue: #4FC3F7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* SCAN LINE EFFECT */
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,135,0.015) 2px, rgba(0,255,135,0.015) 4px); pointer-events: none; z-index: 9999; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: rgba(0,255,135,0.03); }
  .logo { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--green); font-family: 'Syne Mono', monospace; }
  .session-info { font-family: 'Syne Mono', monospace; font-size: 0.7rem; color: var(--muted); }

  /* SCREENS */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 2rem; }
  .screen.active { display: flex; }

  /* LOBBY */
  .lobby-title { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; line-height: 1; text-align: center; margin-bottom: 1rem; }
  .lobby-title span { color: var(--green); }
  .lobby-sub { color: var(--muted); text-align: center; font-size: 1rem; margin-bottom: 3rem; letter-spacing: 0.05em; }
  .teams-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.75rem; width: 100%; max-width: 900px; margin-bottom: 3rem; }
  .team-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 0.5rem; text-align: center; transition: all 0.3s; position: relative; overflow: hidden; }
  .team-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); transform: scaleX(0); transition: transform 0.3s; }
  .team-card.ready::before { transform: scaleX(1); }
  .team-card.ready { border-color: var(--green); }
  .team-name { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.5rem; }
  .team-status { font-size: 1.5rem; }
  .team-label { font-size: 0.7rem; font-weight: 700; color: var(--text); margin-top: 0.25rem; }
  .btn { background: var(--green); color: var(--dark); border: none; padding: 1rem 3rem; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; border-radius: 4px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,135,0.3); }
  .btn:active { transform: translateY(0); }
  .btn-ghost { background: transparent; color: var(--green); border: 1px solid var(--green); }
  .btn-ghost:hover { background: rgba(0,255,135,0.1); box-shadow: none; }

  /* QUESTION SCREEN */
  .q-header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .q-counter { font-family: 'Syne Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
  .q-score-strip { display: flex; gap: 1rem; }
  .qs-team { font-family: 'Syne Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .qs-team span { color: var(--green); font-weight: 700; }

  .timer-ring { position: relative; width: 80px; height: 80px; margin: 0 auto 2rem; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-ring .progress { stroke: var(--green); stroke-width: 4; stroke-dasharray: 220; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; stroke-linecap: round; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne Mono', monospace; font-size: 1.4rem; font-weight: 700; color: var(--green); }

  .threat-badge { display: inline-block; background: rgba(255,68,68,0.15); border: 1px solid var(--danger); color: var(--danger); font-family: 'Syne Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; padding: 0.3rem 0.8rem; border-radius: 2px; margin-bottom: 1rem; }
  .question-text { font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 700; text-align: center; max-width: 800px; line-height: 1.4; margin-bottom: 0.5rem; }
  .question-context { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 2.5rem; font-family: 'Syne Mono', monospace; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; max-width: 800px; }
  .option-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.5rem; text-align: left; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 0.95rem; color: var(--text); transition: all 0.2s; display: flex; align-items: center; gap: 1rem; }
  .option-btn:hover { border-color: var(--green); background: rgba(0,255,135,0.05); }
  .option-btn.correct { background: rgba(0,255,135,0.15); border-color: var(--green); color: var(--green); }
  .option-btn.wrong { background: rgba(255,68,68,0.1); border-color: var(--danger); color: var(--danger); }
  .option-btn.disabled { cursor: default; pointer-events: none; }
  .opt-letter { font-family: 'Syne Mono', monospace; font-size: 0.7rem; font-weight: 700; width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .option-btn.correct .opt-letter { border-color: var(--green); color: var(--green); }
  .option-btn.wrong .opt-letter { border-color: var(--danger); color: var(--danger); }

  /* REVEAL */
  .reveal-box { background: var(--card); border: 1px solid var(--green); border-radius: 12px; padding: 2rem; max-width: 700px; width: 100%; text-align: center; }
  .reveal-icon { font-size: 3rem; margin-bottom: 1rem; }
  .reveal-title { font-size: 1.5rem; font-weight: 800; color: var(--green); margin-bottom: 0.75rem; }
  .reveal-text { color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; font-size: 0.95rem; }
  .points-pop { font-family: 'Syne Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--green); margin-bottom: 1.5rem; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* SCOREBOARD */
  .score-title { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; }
  .score-title span { color: var(--green); }
  .score-sub { color: var(--muted); text-align: center; font-family: 'Syne Mono', monospace; font-size: 0.75rem; letter-spacing: 0.15em; margin-bottom: 3rem; }
  .score-list { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
  .score-row { display: flex; align-items: center; gap: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; transition: all 0.3s; }
  .score-row:first-child { border-color: var(--green); background: rgba(0,255,135,0.05); }
  .score-pos { font-family: 'Syne Mono', monospace; font-size: 0.75rem; color: var(--muted); width: 20px; }
  .score-row:first-child .score-pos { color: var(--green); }
  .score-name { flex: 1; font-weight: 700; font-size: 1rem; }
  .score-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 1s ease; }
  .score-pts { font-family: 'Syne Mono', monospace; font-size: 0.85rem; color: var(--green); font-weight: 700; min-width: 70px; text-align: right; }

  /* GLITCH ANIM */
  @keyframes glitch { 0%,100% { clip-path: inset(0 0 98% 0); } 25% { clip-path: inset(30% 0 50% 0); } 75% { clip-path: inset(70% 0 10% 0); } }
  .glitch { position: relative; }
  .glitch::before { content: attr(data-text); position: absolute; inset: 0; color: var(--green); opacity: 0.5; animation: glitch 3s infinite; clip-path: inset(0 0 98% 0); }

  /* PROGRESS BAR */
  .progress-strip { width: 100%; height: 3px; background: var(--border); position: fixed; top: 60px; left: 0; }
  .progress-fill { height: 100%; background: var(--green); transition: width 0.5s ease; }

  /* FADE IN */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease forwards; }

  /* TEAM ANSWER STATUS */
  .answer-status { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .ans-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .ans-dot.answered { background: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">// CAZADORES DE AMENAZAS — VARIANTE A</div>
  <div class="session-info" id="sessionInfo">SESIÓN DEMO · 6 EQUIPOS · 30 PARTICIPANTES</div>
</header>

<div class="progress-strip"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<!-- LOBBY -->
<div class="screen active" id="screenLobby">
  <div class="lobby-title glitch" data-text="CAZADORES DE">CAZADORES DE<br><span>AMENAZAS</span></div>
  <div class="lobby-sub">SIMULACRO DE CIBERSEGURIDAD EN TIEMPO REAL · 1 FACILITADOR · 6 EQUIPOS</div>
  <div class="teams-grid" id="teamsGrid"></div>
  <button class="btn" onclick="startGame()">INICIAR SIMULACRO</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screenQuestion">
  <div class="q-header">
    <div class="q-counter" id="qCounter">AMENAZA 1 DE 8</div>
    <div class="q-score-strip" id="scoreStrip"></div>
  </div>
  <div class="timer-ring">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="35"/>
      <circle class="progress" cx="40" cy="40" r="35" id="timerCircle"/>
    </svg>
    <div class="timer-num" id="timerNum">60</div>
  </div>
  <div class="threat-badge" id="threatBadge">AMENAZA DETECTADA</div>
  <div class="question-text fade-up" id="questionText"></div>
  <div class="question-context" id="questionContext"></div>
  <div class="options-grid" id="optionsGrid"></div>
  <div class="answer-status" id="answerStatus"></div>
</div>

<!-- REVEAL -->
<div class="screen" id="screenReveal">
  <div class="reveal-box fade-up">
    <div class="reveal-icon" id="revealIcon"></div>
    <div class="reveal-title" id="revealTitle"></div>
    <div class="reveal-text" id="revealText"></div>
    <div class="points-pop" id="revealPoints"></div>
    <button class="btn" onclick="nextQuestion()">SIGUIENTE AMENAZA →</button>
  </div>
</div>

<!-- SCOREBOARD FINAL -->
<div class="screen" id="screenScore">
  <div class="score-title">RESULTADO<br><span>FINAL</span></div>
  <div class="score-sub">SIMULACRO COMPLETADO · RANKING DE EQUIPOS</div>
  <div class="score-list" id="scoreList"></div>
  <div style="display:flex;gap:1rem;">
    <button class="btn btn-ghost" onclick="resetGame()">NUEVA SESIÓN</button>
    <button class="btn" onclick="window.location='facilitador-panel.html'">PANEL FACILITADOR</button>
  </div>
</div>

<script>
const TEAMS = [
  { name: 'Equipo 1', emoji: '🛡️', score: 0 },
  { name: 'Equipo 2', emoji: '🔍', score: 0 },
  { name: 'Equipo 3', emoji: '⚡', score: 0 },
  { name: 'Equipo 4', emoji: '🔒', score: 0 },
  { name: 'Equipo 5', emoji: '🌐', score: 0 },
  { name: 'Equipo 6', emoji: '🎯', score: 0 },
];

const QUESTIONS = [
  {
    type: 'PHISHING',
    text: 'Tu empresa recibe un email del "CEO" pidiendo transferir $50,000 urgente porque está en viaje. El email viene de ceo@empresa-corp.net. ¿Qué hacés?',
    context: 'Email recibido a las 11:47pm · Asunto: URGENTE - Necesito tu ayuda',
    options: ['Transferís porque es el CEO', 'Verificás llamando directamente al CEO', 'Respondés el email pidiendo confirmación', 'Ignorás el email sin reportarlo'],
    correct: 1,
    explanation: 'El dominio "empresa-corp.net" no es el dominio oficial. Siempre verificar por canal alternativo (llamada directa) antes de cualquier transferencia. Esto se llama BEC (Business Email Compromise).',
    points: 1000
  },
  {
    type: 'CONTRASEÑAS',
    text: 'Un compañero te pide tu contraseña del sistema porque "olvidó la suya y necesita el archivo urgente". ¿Cuál es la respuesta correcta?',
    context: 'Situación en oficina · Compañero de confianza hace el pedido',
    options: ['Se la das porque confías en él', 'Le decís que llame a IT para resetear su contraseña', 'Le das acceso temporal con tu cuenta', 'Le enviás la contraseña por WhatsApp'],
    correct: 1,
    explanation: 'Nunca compartir contraseñas, ni con personas de confianza. Las credenciales son personales e intransferibles. IT puede resetear su acceso en minutos.',
    points: 800
  },
  {
    type: 'USB MALICIOSO',
    text: 'Encontrás un pendrive en el estacionamiento de la empresa con la etiqueta "Sueldos 2024". ¿Qué hacés?',
    context: 'Lunes por la mañana · Pendrive cerca de la entrada',
    options: ['Lo conectás para ver qué tiene', 'Lo entregás a seguridad/IT sin conectarlo', 'Lo tirás a la basura', 'Lo llevás a tu casa para revisar'],
    correct: 1,
    explanation: 'Los pendrives abandonados son un ataque clásico de ingeniería social. Pueden contener malware que se ejecuta automáticamente al conectarse. Siempre entregarlo a IT.',
    points: 900
  },
  {
    type: 'SECUESTRO DE DATOS',
    text: 'Tu computadora muestra un mensaje inesperado: "Tus archivos están bloqueados. Tenés 48 horas para pagar o los perdés para siempre". No podés abrir ningún documento.',
    context: 'Son las 9:00am · Tenés reunión importante en 2 horas',
    options: ['Pagás para recuperar los archivos lo antes posible', 'Desconectás el equipo de la red y avisás a IT de inmediato', 'Apagás y encendés la computadora a ver si se soluciona', 'Buscás en Google cómo solucionarlo vos mismo'],
    correct: 1,
    explanation: 'Lo primero es desconectar el equipo de la red para que el problema no se extienda a otros. Nunca pagar — no garantiza recuperar los archivos y financia a los delincuentes. IT tiene protocolos para estos casos y puede recuperar datos desde copias de seguridad.',
    points: 1000
  },
  {
    type: 'INGENIERÍA SOCIAL',
    text: 'Alguien llama diciendo ser de "soporte técnico de Microsoft" y pide acceso remoto a tu computadora para "solucionar un problema detectado". ¿Qué hacés?',
    context: 'Llamada entrante · Número desconocido',
    options: ['Dás acceso porque Microsoft detectó algo', 'Cortás y reportás a IT', 'Pedís que te llamen al día siguiente', 'Les preguntás cómo encontraron tu número'],
    correct: 1,
    explanation: 'Microsoft nunca llama proactivamente a usuarios. Es una estafa de "soporte técnico falso" muy común. Colgar y reportar inmediatamente a IT.',
    points: 800
  },
  {
    type: 'TRABAJO REMOTO',
    text: 'Estás trabajando desde una cafetería y necesitás revisar información confidencial de clientes por email. La cafetería ofrece WiFi gratis. ¿Qué hacés?',
    context: 'Cafetería · WiFi gratuito disponible · Laptop del trabajo',
    options: ['Te conectás al WiFi de la cafetería y revisás el email normalmente', 'Activás la VPN del banco antes de conectarte y revisar cualquier cosa', 'Esperás llegar a la oficina para revisar información sensible', 'Usás los datos móviles de tu celular personal'],
    correct: 1,
    explanation: 'Las redes WiFi públicas pueden estar intervenidas o ser falsas. La VPN del banco crea un canal protegido entre tu computadora y los sistemas del banco, como un "túnel privado" que nadie más puede ver. Siempre activarla cuando trabajés fuera de la oficina.',
    points: 900
  },
  {
    type: 'PHISHING INTERNO',
    text: 'Recibís un email que parece ser del área de Sistemas del banco. Dice: "Por mantenimiento de seguridad, ingresá a este enlace para confirmar tus datos de acceso antes del lunes o tu cuenta quedará bloqueada". ¿Qué hacés?',
    context: 'Email recibido un viernes a las 5pm · El enlace parece del portal del banco pero no es la dirección habitual',
    options: ['Ingresás tu usuario y contraseña porque parece oficial y urgente', 'Llamás a Sistemas directamente para verificar si el email es real', 'Reenviás el email a tu jefe para que decida él', 'Borrás el email y no hacés nada más'],
    correct: 1,
    explanation: 'El banco NUNCA pide usuario y contraseña por email. Ante la duda, siempre verificar llamando directamente al área que supuestamente envió el mensaje — nunca usar los contactos del email sospechoso. Los delincuentes imitan la imagen del propio banco porque saben que la gente confía en comunicaciones internas.',
    points: 1000
  },
  {
    type: 'DATOS SENSIBLES',
    text: 'Terminás una reunión con datos confidenciales en la pizarra. Todos se van. ¿Qué hacés antes de salir?',
    context: 'Sala de reuniones · Datos de clientes escritos en pizarra física',
    options: ['Salís rápido porque ya terminó la reunión', 'Borrás la pizarra completamente', 'Sacás una foto y borrás la pizarra', 'Dejás que el próximo en usar la sala lo borre'],
    correct: 1,
    explanation: 'Los datos físicos son tan sensibles como los digitales. Siempre limpiar pizarras, destruir documentos físicos y no dejar información visible en espacios compartidos.',
    points: 800
  }
];

let currentQ = 0;
let timer = null;
let timeLeft = 60;
let answered = false;
let teamAnswered = [];

// INIT TEAMS
function initTeams() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = TEAMS.map((t, i) => `
    <div class="team-card" id="teamCard${i}">
      <div class="team-name">EQUIPO ${i+1}</div>
      <div class="team-status">${t.emoji}</div>
      <div class="team-label">${t.name}</div>
    </div>
  `).join('');
  // Animate teams ready
  setTimeout(() => {
    TEAMS.forEach((_, i) => {
      setTimeout(() => {
        document.getElementById(`teamCard${i}`).classList.add('ready');
      }, i * 200);
    });
  }, 500);
}

function startGame() {
  TEAMS.forEach(t => t.score = 0);
  currentQ = 0;
  showQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showQuestion() {
  showScreen('screenQuestion');
  const q = QUESTIONS[currentQ];
  answered = false;
  teamAnswered = new Array(TEAMS.length).fill(false);
  timeLeft = 60;

  document.getElementById('qCounter').textContent = `AMENAZA ${currentQ + 1} DE ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${(currentQ / QUESTIONS.length) * 100}%`;
  document.getElementById('threatBadge').textContent = `⚡ ${q.type}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionContext').textContent = `◈ ${q.context}`;

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = ['A','B','C','D'].map((l, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})" id="opt${i}">
      <div class="opt-letter">${l}</div>
      <div>${q.options[i]}</div>
    </button>
  `).join('');

  // Score strip
  document.getElementById('scoreStrip').innerHTML = TEAMS.map(t =>
    `<div class="qs-team">${t.emoji} <span>${t.score}</span></div>`
  ).join('');

  // Answer dots
  document.getElementById('answerStatus').innerHTML = TEAMS.map((t, i) =>
    `<div class="ans-dot" id="dot${i}" title="${t.name}"></div>`
  ).join('');

  // Timer
  clearInterval(timer);
  updateTimer(60);
  timer = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) revealAnswer(-1);
    }
  }, 1000);

  // Simulate teams answering (demo)
  simulateTeamAnswers(q.correct);
}

function simulateTeamAnswers(correct) {
  TEAMS.forEach((_, i) => {
    const delay = 5000 + Math.random() * 20000;
    setTimeout(() => {
      if (!answered) {
        teamAnswered[i] = true;
        document.getElementById(`dot${i}`).classList.add('answered');
        // Check if all answered
        if (teamAnswered.every(Boolean)) {
          clearInterval(timer);
          revealAnswer(correct);
        }
      }
    }, delay);
  });
}

function updateTimer(t) {
  document.getElementById('timerNum').textContent = t;
  const circle = document.getElementById('timerCircle');
  const pct = t / 60;
  circle.style.strokeDashoffset = 220 * (1 - pct);
  circle.style.stroke = t > 20 ? 'var(--green)' : t > 10 ? 'var(--warn)' : 'var(--danger)';
  document.getElementById('timerNum').style.color = t > 20 ? 'var(--green)' : t > 10 ? 'var(--warn)' : 'var(--danger)';
}

function selectAnswer(idx) {
  if (answered) return;
  clearInterval(timer);
  revealAnswer(idx);
}

function revealAnswer(selected) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  const q = QUESTIONS[currentQ];

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selected && selected !== q.correct) btn.classList.add('wrong');
  });

  setTimeout(() => {
    const isCorrect = selected === q.correct;
    if (isCorrect) {
      const pts = Math.round(q.points * (timeLeft / 60) * 0.5 + q.points * 0.5);
      TEAMS[0].score += pts;
    }

    document.getElementById('revealIcon').textContent = isCorrect ? '✅' : '⚠️';
    document.getElementById('revealTitle').textContent = isCorrect ? '¡AMENAZA NEUTRALIZADA!' : 'AMENAZA NO DETECTADA';
    document.getElementById('revealTitle').style.color = isCorrect ? 'var(--green)' : 'var(--warn)';
    document.getElementById('revealText').textContent = q.explanation;
    document.getElementById('revealPoints').textContent = isCorrect ? `+${q.points} PTS` : '0 PTS';
    document.getElementById('revealPoints').style.color = isCorrect ? 'var(--green)' : 'var(--muted)';
    showScreen('screenReveal');
  }, 1500);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showFinalScore();
  } else {
    showQuestion();
  }
}

function showFinalScore() {
  // Give random scores to other teams for demo
  TEAMS.forEach((t, i) => {
    if (i > 0) t.score = Math.floor(Math.random() * 5000) + 2000;
  });
  const sorted = [...TEAMS].sort((a, b) => b.score - a.score);
  const max = sorted[0].score;
  document.getElementById('progressFill').style.width = '100%';

  document.getElementById('scoreList').innerHTML = sorted.map((t, i) => `
    <div class="score-row">
      <div class="score-pos">${['01','02','03','04','05','06'][i]}</div>
      <div class="score-name">${t.emoji} ${t.name}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${(t.score/max)*100}%"></div></div>
      <div class="score-pts">${t.score.toLocaleString()} pts</div>
    </div>
  `).join('');
  showScreen('screenScore');
}

function resetGame() {
  TEAMS.forEach(t => t.score = 0);
  currentQ = 0;
  document.getElementById('progressFill').style.width = '0%';
  showScreen('screenLobby');
}

initTeams();
</script>
</body>
</html>
